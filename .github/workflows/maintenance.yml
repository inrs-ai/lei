name: Repository Maintenance

on:
  schedule:
    - cron: "26 8 17 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate maintenance report
        run: |
          cat > MAINTENANCE.md << EOF
          # 🛠 Repo Maintenance Report

          > Auto-generated by scheduled workflow.

          | Item            | Detail                                          |
          | --------------- | ----------------------------------------------- |
          | Last Check      | $(date -u '+%Y-%m-%d %H:%M:%S UTC')             |
          | Runner OS       | $RUNNER_OS                                       |
          | Repository      | $GITHUB_REPOSITORY                               |
          | Default Branch  | $(git remote show origin | awk '/HEAD branch/ {print $NF}') |
          | Total Commits   | $(git rev-list --count HEAD)                     |
          | Latest Commit   | $(git log -1 --format='%h - %s (%ai)')           |
          | Repo Size       | $(du -sh --exclude=.git . | cut -f1)             |
          EOF

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MAINTENANCE.md
          git commit --allow-empty -m "chore(maintenance): monthly repo health check [$(date -u '+%Y-%m')]"
          git push origin main
